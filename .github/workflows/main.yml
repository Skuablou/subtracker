name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > subtracker.keystore

      - name: Create Android TWA Project
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p twa-app/app/src/main/res/values
          for dpi in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p twa-app/app/src/main/res/mipmap-${dpi}
          done
          convert -size 72x72   xc:'#0a0a0f' twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 48x48   xc:'#0a0a0f' twa-app/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 96x96   xc:'#0a0a0f' twa-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:'#0a0a0f' twa-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:'#0a0a0f' twa-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > twa-app/app/src/main/res/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SubTracker</string>
          </resources>
          XMLEOF

          cat > twa-app/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.subtracker.app">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://subtracker-snowy.vercel.app" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="@color/colorPrimary" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="subtracker-snowy.vercel.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

          mkdir -p twa-app/app/src/main/res/values
          cat > twa-app/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0a0a0f</color>
          </resources>
          XMLEOF

          cat > twa-app/app/build.gradle << 'GEOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.subtracker.app"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file('../../subtracker.keystore')
                      storePassword System.getenv('KEYSTORE_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASSWORD')
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.3.0'
          }
          GEOF

          cat > twa-app/build.gradle << 'GEOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GEOF

          cat > twa-app/settings.gradle << 'GEOF'
          include ':app'
          GEOF

          echo "sdk.dir=$ANDROID_SDK_ROOT" > twa-app/local.properties

          cat > twa-app/gradle.properties << 'GEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          GEOF

          curl -sL https://services.gradle.org/distributions/gradle-7.6-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          cd twa-app && /tmp/gradle-7.6/bin/gradle wrapper --gradle-version 7.6 --distribution-type bin
          chmod +x gradlew

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd twa-app
          ./gradlew assembleRelease
          ls -la app/build/outputs/apk/release/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subtracker-apk
          path: twa-app/app/build/outputs/apk/release/app-release.apk
