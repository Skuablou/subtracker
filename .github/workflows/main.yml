name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: Subtracker123
      BUBBLEWRAP_KEY_PASSWORD: Subtracker123
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap and Expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore subtracker.keystore \
            -alias subtracker \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Subtracker123 \
            -keypass Subtracker123 \
            -dname "CN=SubTracker, OU=App, O=SubTracker, L=City, S=State, C=US"

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Create TWA Manifest
        run: |
          mkdir -p twa-app
          cat > twa-app/twa-manifest.json << 'MANIFEST_EOF'
          {
            "packageId": "com.subtracker.app",
            "host": "subtracker-snowy.vercel.app",
            "name": "SubTracker",
            "launcherName": "SubTracker",
            "display": "standalone",
            "themeColor": "#0a0a0f",
            "navigationColor": "#0a0a0f",
            "backgroundColor": "#0a0a0f",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://subtracker-snowy.vercel.app/icons/icon-512.png",
            "maskableIconUrl": "https://subtracker-snowy.vercel.app/icons/icon-512.png",
            "monochromeIconUrl": "https://subtracker-snowy.vercel.app/icons/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "../subtracker.keystore",
              "alias": "subtracker"
            },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://subtracker-snowy.vercel.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          MANIFEST_EOF

      - name: Build APK
        run: |
          cd twa-app
          expect << 'EXPECT_EOF'
          set timeout 600
          spawn bubblewrap build --skipPwaValidation
          expect {
            "regenerate" { send "n\r"; exp_continue }
            "Domain:"    { send "\r"; exp_continue }
            eof
          }
          EXPECT_EOF
          ls -la app-release-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subtracker-apk
          path: twa-app/app-release-signed.apk
