name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: Subtracker123
      BUBBLEWRAP_KEY_PASSWORD: Subtracker123
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap and Expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore subtracker.keystore \
            -alias subtracker \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Subtracker123 \
            -keypass Subtracker123 \
            -dname "CN=SubTracker, OU=App, O=SubTracker, L=City, S=State, C=US"

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Init TWA Project
        run: |
          mkdir -p twa-app
          cd twa-app
          expect << 'EXPECT_EOF'
          set timeout 60
          spawn bubblewrap init --manifest https://subtracker-snowy.vercel.app/manifest.json
          expect {
            "Path to existing signing key" { send "../subtracker.keystore\r"; exp_continue }
            "Key alias"                    { send "subtracker\r"; exp_continue }
            "Key store password"           { send "Subtracker123\r"; exp_continue }
            "Key password"                 { send "Subtracker123\r"; exp_continue }
            "Package ID"                   { send "com.subtracker.app\r"; exp_continue }
            "? "                           { send "\r"; exp_continue }
            eof
          }
          EXPECT_EOF
          ls -la

      - name: Build APK
        run: |
          cd twa-app
          expect << 'EXPECT_EOF'
          set timeout 600
          spawn bubblewrap build --skipPwaValidation
          expect {
            "regenerate" { send "n\r"; exp_continue }
            "? "         { send "\r"; exp_continue }
            eof
          }
          EXPECT_EOF
          ls -la app-release-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subtracker-apk
          path: twa-app/app-release-signed.apk
