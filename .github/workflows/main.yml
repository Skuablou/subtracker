name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore subtracker.keystore \
            -alias subtracker \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Subtracker123 \
            -keypass Subtracker123 \
            -dname "CN=SubTracker, OU=App, O=SubTracker, L=City, S=State, C=US"

      - name: Init TWA
        run: |
          mkdir twa-app && cd twa-app
          yes | bubblewrap init \
            --manifest "https://subtracker-snowy.vercel.app/manifest.json" \
            --directory . \
            --packageId "com.subtracker.app" \
            --name "SubTracker" \
            --shortName "SubTracker" \
            --themeColor "#0a0a0f" \
            --backgroundColor "#0a0a0f" \
            --startUrl "/" \
            --iconUrl "https://subtracker-snowy.vercel.app/icons/icon-512.png" \
            --maskableIconUrl "https://subtracker-snowy.vercel.app/icons/icon-512.png" \
            --signingKeyPath ../subtracker.keystore \
            --signingKeyAlias subtracker \
            --signingKeyStorePassword Subtracker123 \
            --signingKeyPassword Subtracker123

      - name: Build APK
        run: cd twa-app && bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subtracker-apk
          path: twa-app/app-release-signed.apk
